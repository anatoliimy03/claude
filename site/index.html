<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Курс Анатолія Маліновського</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .hero {
      width: 100%;
      max-width: 900px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      padding: 56px 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      text-align: center;
    }
    .badge {
      display: inline-block;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      font-size: 14px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: clamp(36px, 7vw, 68px);
      line-height: 1.05;
      margin: 0 0 16px;
    }
    p {
      margin: 0 auto 28px;
      max-width: 640px;
      font-size: 18px;
      line-height: 1.6;
      color: rgba(255,255,255,0.84);
    }
    .button {
      display: inline-block;
      padding: 16px 26px;
      border-radius: 14px;
      background: #22c55e;
      color: #08110c;
      text-decoration: none;
      font-weight: 700;
      transition: transform .2s ease, box-shadow .2s ease;
      box-shadow: 0 10px 30px rgba(34, 197, 94, 0.35);
    }
    .button:hover { transform: translateY(-2px); }
  </style>
</head>
<body>
  <section class="hero">
    <div class="badge">Простий тестовий лендінг 🚀</div>
    <h1>Курс Анатолія Маліновського</h1>
    <p>
      Допоможу тобі швидше зрости через практичні інструменти, системний підхід і зрозумілі кроки без води.
    </p>
    <a class="button" href="#">Хочу дізнатись більше</a>
  </section>
</body>
</html>
