<!DOCTYPE html><html lang="uk"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Aima SMM Planner</title><link rel="stylesheet" href="./styles.css"></head><body data-page="calendar"><div class="app"><aside class="sidebar"><div class="logo"><div class="logo-badge">A</div><div><strong>Adminpanel</strong><small>Версія 1.2.0</small></div></div><div class="sidebar-title">Навігація</div><div class="sidebar-menu" id="sidebarMenu"></div></aside><main class="main"><header class="topbar"><div><h1 id="pageTitle"></h1><p id="pageSubtitle"></p></div><div class="top-actions"><button class="btn btn-soft" id="goSettings">Довідники</button></div></header><section class="dashboard-stats"><div class="stat-card"><strong>1355</strong><span>Запланованих постів</span></div><div class="stat-card"><strong>340</strong><span>Нових тем</span></div><div class="stat-card"><strong>1299</strong><span>Активних генерацій</span></div><div class="stat-card"><strong>603</strong><span>Чернеток</span></div></section><section class="layout"><div class="card"><div class="card-head"><h2 id="currentMonth"></h2><div class="month-switch"><button class="icon-btn" id="prevMonth">‹</button><button class="icon-btn" id="nextMonth">›</button></div></div><div class="filters" id="filters"></div><div class="weekdays" id="weekdays"></div><div class="calendar-grid" id="calendarGrid"></div></div><div class="card"><div class="editor-header"><h2>Пост на <span id="selectedDate"></span></h2><span class="status-badge draft" id="statusBadge">Чернетка</span></div><div class="stack"><div class="field"><label>Дата</label><input id="postDate" type="text"></div><div class="field"><label>Готова тема</label><div class="field-row"><select id="topicPreset"></select><button class="btn btn-secondary" id="usePreset">Взяти</button></div></div><div class="field"><label>Своя тема</label><input id="customTopic" type="text" placeholder="Введи тему поста"></div><div class="grid-2"><div class="field"><label>Рубрика</label><select id="rubricSelect"></select></div><div class="field"><label>Плейсмент</label><select id="placementSelect"></select></div></div><div class="field"><label>Формат</label><select id="formatSelect"></select></div><div class="field"><label>Текст</label><textarea id="generatedText" placeholder="Тут буде текст поста"></textarea><div class="top-actions"><button class="btn btn-primary" id="generateText">Згенерувати текст</button></div></div><div class="field"><label>Прев'ю візуалу</label><div class="preview-box"><h3 id="imageTitle">Новий контент</h3><p id="imageDesc">Плейсмент: Instagram Post • Формат: Карусель</p></div><div class="top-actions"><button class="btn btn-primary" id="generateImage">Згенерувати візуал</button></div></div><div class="top-actions"><button class="btn btn-secondary" id="saveDraft">Зберегти чернетку</button><button class="btn btn-primary" id="approvePost">Затвердити</button></div></div></div></section></main></div><script src="./app.js"></script></body></html>
