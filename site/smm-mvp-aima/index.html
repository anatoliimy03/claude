<!DOCTYPE html><html lang="uk"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Aima SMM Planner</title><link rel="stylesheet" href="./styles.css"></head><body data-page="calendar"><div class="app compact"><aside class="sidebar"><div class="logo"><div class="logo-badge">A</div><div><strong>Adminpanel</strong><small>Версія 1.3.1</small></div></div><div class="sidebar-title">Навігація</div><div class="sidebar-menu" id="sidebarMenu"></div></aside><main class="main"><header class="topbar"><div><h1 id="pageTitle"></h1><p id="pageSubtitle"></p></div></header><section class="dashboard-stats mini compact-stats"><div class="stat-card"><strong id="statPosts">0</strong><span>Постів</span></div><div class="stat-card"><strong id="statTopics">0</strong><span>Тем</span></div><div class="stat-card"><strong id="statHolidays">0</strong><span>Дат</span></div><div class="stat-card"><strong id="statDrafts">0</strong><span>Чернеток</span></div></section><section class="layout fit-screen tighter"><div class="card calendar-card"><div class="card-head slim"><h2 id="currentMonth"></h2><div class="month-switch"><button class="icon-btn" id="prevMonth" type="button">‹</button><button class="icon-btn" id="nextMonth" type="button">›</button></div></div><div class="filters" id="filters"></div><div class="weekdays" id="weekdays"></div><div class="calendar-grid compact-grid tighter-grid" id="calendarGrid"></div></div><div class="card editor-card"><div class="editor-header slim"><h2>Пост на <span id="selectedDate"></span></h2><span class="status-badge draft" id="statusBadge">Чернетка</span></div><form class="stack dense ultra-dense" id="postForm"><div class="grid-2 compact-grid-row"><div class="field"><label>Дата</label><input id="postDate" type="text"></div><div class="field"><label>Святкова підказка</label><div class="holiday-box" id="holidayHint">Немає рекомендації</div></div></div><div class="field"><label>Готова тема</label><div class="field-row"><select id="topicPreset"></select><button class="btn btn-secondary" id="usePreset" type="button">Взяти</button></div></div><div class="field"><label>Своя тема</label><input id="customTopic" type="text" placeholder="Введи тему поста"></div><div class="grid-3 compact-grid-row"><div class="field"><label>Рубрика</label><select id="rubricSelect"></select></div><div class="field"><label>Плейсмент</label><select id="placementSelect"></select></div><div class="field"><label>Формат</label><select id="formatSelect"></select></div></div><div class="field"><label>Режим генерації</label><div class="field-row"><select id="generationMode"><option value="new">З нуля</option><option value="rework">Перегенерувати з іншого поста</option></select><button class="btn btn-secondary" id="loadSourcePost" type="button">Взяти пост</button></div></div><div class="field"><label>Базовий пост / текст для перегенерації</label><textarea id="sourcePost" placeholder="Сюди можна вставити готовий пост з Instagram, щоб перегенерувати під інший плейсмент"></textarea></div><div class="field"><label>Текст</label><textarea id="generatedText" placeholder="Тут буде текст поста"></textarea><div class="top-actions"><button class="btn btn-primary" id="generateText" type="button">Згенерувати текст</button></div></div><div class="grid-2 swap-preview compact-grid-row"><div class="field"><label>Прев'ю візуалу</label><div class="preview-box small-preview" id="previewBox"><img id="uploadedPreview" class="uploaded-preview hidden" alt="uploaded visual"><div class="preview-overlay"><h3 id="imageTitle">Новий контент</h3><p id="imageDesc">Плейсмент: Instagram Post • Формат: Карусель</p></div></div><div class="top-actions"><button class="btn btn-primary" id="generateImage" type="button">Згенерувати візуал</button></div></div><div class="field"><label>Свій візуал</label><input id="visualUpload" type="file" accept="image/*"><div class="size-note" id="visualSize">Рекомендований розмір: 1080×1350</div></div></div><div class="top-actions"><button class="btn btn-secondary" id="saveDraft" type="submit">Зберегти чернетку</button><button class="btn btn-primary" id="approvePost" type="button">Затвердити</button></div></form></div></section></main></div><script src="./app.js"></script></body></html>
