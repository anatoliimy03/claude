<!DOCTYPE html><html lang="uk"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Aima SMM Planner — Settings</title><link rel="stylesheet" href="./styles.css"></head><body data-page="settings"><div class="app"><aside class="sidebar"><div class="logo"><div class="logo-badge">A</div><div><strong>Adminpanel</strong><small>Версія 1.3.0</small></div></div><div class="sidebar-title">Навігація</div><div class="sidebar-menu" id="sidebarMenu"></div></aside><main class="main"><header class="topbar"><div><h1 id="pageTitle"></h1><p id="pageSubtitle"></p></div><div class="top-actions"><button class="btn btn-secondary" data-nav="calendar">До календаря</button></div></header><section class="dashboard-stats" id="statsCards"></section><section class="settings-layout"><div class="settings-grid"><div class="card settings-card"><h3>Рубрики</h3><form class="add-row" id="rubricForm"><input id="rubricInput" type="text" placeholder="Нова рубрика"><button class="btn btn-primary" id="addRubric" type="submit">Додати</button></form><div class="settings-list" id="rubricsList"></div></div><div class="card settings-card"><h3>Плейсменти</h3><form class="add-row" id="placementForm"><input id="placementInput" type="text" placeholder="Новий плейсмент"><button class="btn btn-primary" id="addPlacement" type="submit">Додати</button></form><div class="settings-list" id="placementsList"></div></div><div class="card settings-card"><h3>Формати</h3><form class="add-row" id="formatForm"><input id="formatInput" type="text" placeholder="Новий формат"><button class="btn btn-primary" id="addFormat" type="submit">Додати</button></form><div class="settings-list" id="formatsList"></div></div><div class="card settings-card"><h3>Розподіл логіки</h3><p class="muted-note">Теми редагуються у вкладці “Теми”. Наради зберігаються у вкладці “Наради”. Тут залишаються лише технічні довідники.</p><div class="top-actions"><button class="btn btn-secondary" data-nav="topics">До тем</button><button class="btn btn-primary" data-nav="meetings">До нарад</button></div></div></div></section></main></div><script src="./app.js"></script></body></html>
